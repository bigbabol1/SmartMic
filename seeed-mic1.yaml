# ══════════════════════════════════════════════════════
#  Seeed-Mic1 — Assist Satellite
#  XIAO ESP32-S3 · 1× I2S MEMS mic (INMP441 or ICS-43434, drop-in compatible) · on-device microWakeWord
# ══════════════════════════════════════════════════════

substitutions:
  # Set to "INMP441" or "ICS-43434" — purely informational; ESPHome I2S config is identical for both.
  mic_module: "INMP441"
  # Home Assistant assist_satellite entity id of THIS device. Used by the voice timer
  # hooks below to tell mic_to_mediaplayer.announce which Mic2MP instance should
  # speak the timer ring on its configured speaker. Override per device when the
  # ESPHome name differs from "seeed-mic1".
  satellite_entity_id: "assist_satellite.seeed_mic1"

esphome:
  name: seeed-mic1
  friendly_name: Seeed-mic1
  on_boot:
    priority: -100
    then:
      - light.turn_on:
          id: status_led
          effect: "pulse_slow"
      - lambda: |-
          id(satellite).set_noise_suppression_level(id(g_noise_level));
          id(satellite).set_auto_gain(id(g_auto_gain));
          id(satellite).set_volume_multiplier(id(g_volume_mult));
          for (auto* m : id(mww).get_wake_words()) {
            m->set_probability_cutoff((uint8_t)(id(g_prob_cutoff) * 255.0f));
          }
          ESP_LOGI("boot", "Applied: ns=%d ag=%d vol=%.1f cut=%.2f sw=%d",
                   id(g_noise_level), id(g_auto_gain), id(g_volume_mult),
                   id(g_prob_cutoff), id(g_sliding_window));
          id(mic_array).add_data_callback([](const std::vector<uint8_t>& data) {
            size_t n = data.size() / 4;
            if (n == 0) return;
            double sumsq = 0;
            for (size_t i = 0; i < n; i++) {
              int32_t sample;
              memcpy(&sample, data.data() + i * 4, 4);
              double s = (double)sample / 2147483648.0;
              sumsq += s * s;
            }
            float rms = sqrtf((float)(sumsq / n));
            float dbfs = 20.0f * log10f(rms + 1e-12f);
            id(g_loudness) = 0.2f * dbfs + 0.8f * id(g_loudness);
          });
          ESP_LOGI("boot", "Loudness callback registered");
          ESP_LOGI("boot", "Microphone module: %s", "${mic_module}");
      - delay: 10s
      - light.turn_off: status_led
      - if:
          condition:
            and:
              - switch.is_off: mic_mute
              - switch.is_on: wakeword_detection_enable
          then:
            - logger.log:
                level: INFO
                format: "Starting micro_wake_word listening"
            - micro_wake_word.start:
          else:
            - logger.log:
                level: WARN
                format: "oWW NOT started: mic_mute or wakeword_detection_enable blocks"

esp32:
  board: esp32-s3-devkitc-1
  framework:
    type: esp-idf
    version: recommended
    sdkconfig_options:
      CONFIG_ESP32S3_DEFAULT_CPU_FREQ_240: y
      CONFIG_COMPILER_OPTIMIZATION_PERFORMANCE: y
  flash_size: 8MB

psram:
  mode: octal
  speed: 80MHz

logger:
  level: INFO

api:
  encryption:
    key: "hJmFYgSwuZhrgUfJLp7oYFKiY3q8nQCg7YKntm3beHk="
  services:
    - service: start_follow_up
      then:
        - logger.log: "Follow-up STT requested via API"
        - if:
            condition:
              and:
                - switch.is_off: mic_mute
                - switch.is_on: wakeword_detection_enable
            then:
              - micro_wake_word.stop:
              - text_sensor.template.publish:
                  id: satellite_state
                  state: "Hört zu"
              - light.turn_on:
                  id: status_led
                  effect: none
              - voice_assistant.start:
    - service: end_persistent
      then:
        - logger.log: "End persistent conversation via API"
        - voice_assistant.stop:
        - delay: 200ms
        - light.turn_off: status_led
        - text_sensor.template.publish:
            id: satellite_state
            state: "Bereit"
        - if:
            condition:
              and:
                - switch.is_off: mic_mute
                - switch.is_on: wakeword_detection_enable
            then:
              - micro_wake_word.start:

ota:
  - platform: esphome
    password: "43d53d953b2654bf69e8c40113eff3a6"

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  power_save_mode: NONE
  fast_connect: true
  ap:
    ssid: "Seeed-Mic1 Fallback Hotspot"
    password: "bKxpJ2WQbxVC"

captive_portal:

# ── Persistent globals ──
globals:
  - id: g_wakeword_detection_state
    type: bool
    restore_value: true
    initial_value: '1'
  - id: g_noise_level
    type: int
    restore_value: true
    initial_value: '2'
  - id: g_auto_gain
    type: int
    restore_value: true
    initial_value: '24'
  - id: g_volume_mult
    type: float
    restore_value: true
    initial_value: '2.0'
  - id: g_prob_cutoff
    type: float
    restore_value: true
    initial_value: '0.5'
  - id: g_sliding_window
    type: int
    restore_value: true
    initial_value: '10'
  - id: g_loudness
    type: float
    restore_value: false
    initial_value: '-100.0'

# ── I2S bus (shared) ──
i2s_audio:
  id: i2s_bus
  i2s_lrclk_pin: GPIO8   # WS
  i2s_bclk_pin:  GPIO7   # BCLK

# ── Microphone (mono, right channel via L/R→VDD; INMP441 or ICS-43434) ──
microphone:
  - platform: i2s_audio
    id: mic_array
    i2s_audio_id: i2s_bus
    adc_type: external
    i2s_din_pin: GPIO9
    pdm: false
    bits_per_sample: 32bit
    channel: right

# ── On-device wake word (gates voice_assistant) ──
micro_wake_word:
  id: mww
  microphone: mic_array
  vad:
  models:
    - model: hey_jarvis
      probability_cutoff: 0.5
      sliding_window_size: 10
  on_wake_word_detected:
    - logger.log:
        level: INFO
        format: "Wake word detected: %s"
        args: [wake_word]
    - light.turn_on:
        id: status_led
        effect: none
    - text_sensor.template.publish:
        id: satellite_state
        state: "Hört zu"
    - voice_assistant.start:
        wake_word: !lambda 'return wake_word;'

# ── Voice assistant (HA pipeline) ──
voice_assistant:
  id: satellite
  microphone: mic_array
  use_wake_word: false
  noise_suppression_level: 2
  auto_gain: 24dBFS
  volume_multiplier: 2.0

  on_stt_vad_end:
    - logger.log: "STT VAD end — processing"
    - light.turn_on:
        id: status_led
        effect: "blink_fast"
    - text_sensor.template.publish:
        id: satellite_state
        state: "Verarbeite"

  on_tts_start:
    - logger.log: "TTS start"
    - light.turn_on:
        id: status_led
        effect: "blink_slow"
    - text_sensor.template.publish:
        id: satellite_state
        state: "Antwortet"

  on_tts_end:
    - logger.log: "TTS end"
    - text_sensor.template.publish:
        id: satellite_state
        state: "Bereit"

  # ── Voice-timer hooks ──
  # Pattern-B satellite has no local speaker, so the timer ring is routed to the
  # Google/MA speaker via the mic_to_mediaplayer.announce service (added in
  # Mic2MP v1.5.0). Mic2MP knows which media_player this satellite is bound to,
  # so the YAML stays speaker-agnostic — only the assist_satellite entity id
  # of THIS device is needed (see substitutions.satellite_entity_id).
  on_timer_started:
    - logger.log:
        level: INFO
        format: "Timer started: %s (%us)"
        args: [timer.name.c_str(), (unsigned int) timer.total_seconds]
    - text_sensor.template.publish:
        id: satellite_state
        state: "Timer läuft"

  on_timer_finished:
    - logger.log:
        level: INFO
        format: "Timer finished: %s"
        args: [timer.name.c_str()]
    - light.turn_on:
        id: status_led
        effect: "blink_fast"
    - text_sensor.template.publish:
        id: satellite_state
        state: "Timer fertig"
    - homeassistant.service:
        service: mic_to_mediaplayer.announce
        data:
          satellite_entity_id: ${satellite_entity_id}
        data_template:
          message: '{% if timer_name %}Timer {{ timer_name }} ist fertig.{% else %}Timer ist fertig.{% endif %}'
        variables:
          timer_name: !lambda 'return timer.name;'
    - delay: 8s
    - light.turn_off: status_led
    - text_sensor.template.publish:
        id: satellite_state
        state: "Bereit"

  on_timer_cancelled:
    - logger.log:
        level: INFO
        format: "Timer cancelled: %s"
        args: [timer.name.c_str()]
    - text_sensor.template.publish:
        id: satellite_state
        state: "Bereit"

  on_timer_updated:
    - logger.log:
        level: INFO
        format: "Timer updated: %s (%us left)"
        args: [timer.name.c_str(), (unsigned int) timer.seconds_left]

  on_end:
    - logger.log: "Pipeline end"
    - delay: 500ms
    - if:
        condition:
          lambda: 'return !id(satellite).is_running();'
        then:
          - logger.log: "VA idle — restoring wake mode"
          - light.turn_off: status_led
          - text_sensor.template.publish:
              id: satellite_state
              state: "Bereit"
          - if:
              condition:
                and:
                  - switch.is_off: mic_mute
                  - switch.is_on: wakeword_detection_enable
              then:
                - micro_wake_word.start:
        else:
          - logger.log: "VA still running — continue conversation, skip wake restart"

  on_error:
    - logger.log:
        format: "Pipeline error — code=%s msg=%s"
        args: [code.c_str(), message.c_str()]
    - if:
        condition:
          and:
            - switch.is_on: persistent_conversation
            - switch.is_off: mic_mute
            - switch.is_on: wakeword_detection_enable
            - lambda: 'return std::string(code) == "stt-no-text-recognized";'
        then:
          - logger.log: "Persistent mode: STT silent — quietly re-arming listen"
          - voice_assistant.stop:
          - delay: 200ms
          - text_sensor.template.publish:
              id: satellite_state
              state: "Hört zu"
          - light.turn_on:
              id: status_led
              effect: none
          - voice_assistant.start:
        else:
          - light.turn_on:
              id: status_led
              effect: "error_flash"
          - text_sensor.template.publish:
              id: satellite_state
              state: "Fehler"
          - delay: 5s
          - light.turn_off: status_led
          - voice_assistant.stop:
          - delay: 3s
          - if:
              condition:
                and:
                  - switch.is_off: mic_mute
                  - switch.is_on: wakeword_detection_enable
              then:
                - micro_wake_word.start:

# ── UI controls ──
switch:
  - platform: template
    name: "Mikrofon stumm"
    id: mic_mute
    icon: mdi:microphone-off
    restore_mode: RESTORE_DEFAULT_OFF
    lambda: |-
      return id(mic_mute).state;
    turn_on_action:
      - micro_wake_word.stop:
      - voice_assistant.stop:
      - light.turn_off: status_led
      - text_sensor.template.publish:
          id: satellite_state
          state: "Stumm"
    turn_off_action:
      - text_sensor.template.publish:
          id: satellite_state
          state: "Bereit"
      - if:
          condition:
            switch.is_on: wakeword_detection_enable
          then:
            - micro_wake_word.start:

  - platform: template
    name: "Persistent Conversation"
    id: persistent_conversation
    icon: mdi:repeat
    restore_mode: RESTORE_DEFAULT_ON
    optimistic: true

  - platform: template
    name: "Wake Word Detection"
    id: wakeword_detection_enable
    icon: mdi:microphone
    restore_mode: RESTORE_DEFAULT_ON
    lambda: |-
      return id(g_wakeword_detection_state);
    turn_on_action:
      - globals.set:
          id: g_wakeword_detection_state
          value: 'true'
      - logger.log: "Wake word detection ENABLED"
      - if:
          condition:
            switch.is_off: mic_mute
          then:
            - micro_wake_word.start:
            - text_sensor.template.publish:
                id: satellite_state
                state: "Bereit"
    turn_off_action:
      - globals.set:
          id: g_wakeword_detection_state
          value: 'false'
      - logger.log: "Wake word detection DISABLED"
      - micro_wake_word.stop:
      - voice_assistant.stop:
      - text_sensor.template.publish:
          id: satellite_state
          state: "Aus"

number:
  - platform: template
    name: "Geräuschunterdrückung"
    id: noise_suppression
    icon: mdi:waveform
    min_value: 0
    max_value: 4
    step: 1
    lambda: |-
      return id(g_noise_level);
    set_action:
      - lambda: |-
          id(g_noise_level) = (int)x;
          id(satellite).set_noise_suppression_level((int)x);
          id(noise_suppression).publish_state(x);
      - logger.log:
          format: "Geräuschunterdrückung: %d"
          args: ['(int)x']

  - platform: template
    name: "Auto-Gain (dBFS)"
    id: auto_gain_ctrl
    icon: mdi:knob
    min_value: 0
    max_value: 31
    step: 1
    lambda: |-
      return id(g_auto_gain);
    set_action:
      - lambda: |-
          id(g_auto_gain) = (int)x;
          id(satellite).set_auto_gain((int)x);
          id(auto_gain_ctrl).publish_state(x);
      - logger.log:
          format: "Auto-Gain: %d dBFS"
          args: ['(int)x']

  - platform: template
    name: "Mikrofon-Verstärkung"
    id: volume_amplifier
    icon: mdi:volume-high
    min_value: 0.5
    max_value: 12.0
    step: 0.5
    lambda: |-
      return id(g_volume_mult);
    set_action:
      - lambda: |-
          id(g_volume_mult) = x;
          id(satellite).set_volume_multiplier(x);
          id(volume_amplifier).publish_state(x);
      - logger.log:
          format: "Verstärkung: %.1f"
          args: ['x']

  - platform: template
    name: "Wake Probability Cutoff"
    id: prob_cutoff_ctrl
    icon: mdi:tune
    min_value: 0.3
    max_value: 0.95
    step: 0.05
    lambda: |-
      return id(g_prob_cutoff);
    set_action:
      - lambda: |-
          id(g_prob_cutoff) = x;
          for (auto* m : id(mww).get_wake_words()) {
            m->set_probability_cutoff((uint8_t)(x * 255.0f));
          }
          id(prob_cutoff_ctrl).publish_state(x);
      - logger.log:
          format: "Probability Cutoff: %.2f"
          args: ['x']

  - platform: template
    name: "Wake Sliding Window"
    id: sliding_window_ctrl
    icon: mdi:tune-variant
    min_value: 1
    max_value: 20
    step: 1
    lambda: |-
      return id(g_sliding_window);
    set_action:
      - lambda: |-
          id(g_sliding_window) = (int)x;
          id(sliding_window_ctrl).publish_state(x);
      - logger.log:
          format: "Sliding Window: %d (YAML-Edit + Recompile erforderlich)"
          args: ['(int)x']

button:
  - platform: restart
    name: "Neustart"
    icon: mdi:restart
    entity_category: config

text_sensor:
  - platform: template
    name: "Satellite Status"
    id: satellite_state
    icon: mdi:assistant
    lambda: |-
      return {"Bereit"};

binary_sensor:
  - platform: status
    name: "Verbindungsstatus"
    entity_category: diagnostic

sensor:
  - platform: template
    name: "Mikrofon Loudness (dBFS)"
    id: mic_loudness
    icon: mdi:volume-vibrate
    unit_of_measurement: "dBFS"
    accuracy_decimals: 1
    update_interval: 1s
    lambda: |-
      return id(g_loudness);

# ── Onboard user LED (GPIO4, active-low) ──
output:
  - platform: gpio
    id: led_out
    pin:
      number: GPIO4
      inverted: true

light:
  - platform: binary
    id: status_led
    name: "Status LED"
    output: led_out
    effects:
      - strobe:
          name: "pulse_slow"
          colors:
            - state: true
              duration: 800ms
            - state: false
              duration: 800ms
      - strobe:
          name: "blink_fast"
          colors:
            - state: true
              duration: 120ms
            - state: false
              duration: 120ms
      - strobe:
          name: "blink_slow"
          colors:
            - state: true
              duration: 500ms
            - state: false
              duration: 500ms
      - strobe:
          name: "error_flash"
          colors:
            - state: true
              duration: 100ms
            - state: false
              duration: 100ms

