# ══════════════════════════════════════════════════════
#  SmartMic — Assist Satellite (fleet firmware)
#  XIAO ESP32-S3 · 1× I2S MEMS mic (INMP441 or ICS-43434, drop-in compatible) · on-device microWakeWord
#  Standard wiring for new builds: L/R pin tied to GND → left channel.
#  Single firmware image for ALL SmartMic units — name_add_mac_suffix gives each
#  device a unique hostname (smartmic-<last6mac>); satellite_entity_id is derived
#  at runtime from App.get_name() so timer ring routes to the correct Mic2MP.
# ══════════════════════════════════════════════════════

substitutions:
  # Set to "INMP441" or "ICS-43434" — purely informational; ESPHome I2S config is identical for both.
  mic_module: "INMP441"
  # Firmware release version shown in HA's update entity as "Installed Version".
  # CI overrides this via `-s fw_version <tag>` so the installed value matches manifest.json.
  fw_version: "0.0.0-dev"

esphome:
  name: smartmic
  name_add_mac_suffix: true
  friendly_name: SmartMic
  project:
    name: bigbabol1.smartmic
    version: "${fw_version}"
  on_boot:
    priority: -100
    then:
      - light.turn_on:
          id: status_led
          effect: "pulse_slow"
      - lambda: |-
          id(satellite).set_noise_suppression_level(id(g_noise_level));
          id(satellite).set_auto_gain(id(g_auto_gain));
          id(satellite).set_volume_multiplier(id(g_volume_mult));
          for (auto* m : id(mww).get_wake_words()) {
            m->set_probability_cutoff((uint8_t)(id(g_prob_cutoff) * 255.0f));
          }
          ESP_LOGI("boot", "Applied: ns=%d ag=%d vol=%.1f cut=%.2f sw=%d",
                   id(g_noise_level), id(g_auto_gain), id(g_volume_mult),
                   id(g_prob_cutoff), id(g_sliding_window));
          id(mic_array).add_data_callback([](const std::vector<uint8_t>& data) {
            size_t n = data.size() / 4;
            if (n == 0) return;
            double sumsq = 0;
            for (size_t i = 0; i < n; i++) {
              int32_t sample;
              memcpy(&sample, data.data() + i * 4, 4);
              double s = (double)sample / 2147483648.0;
              sumsq += s * s;
            }
            float rms = sqrtf((float)(sumsq / n));
            float dbfs = 20.0f * log10f(rms + 1e-12f);
            id(g_loudness) = 0.2f * dbfs + 0.8f * id(g_loudness);
          });
          ESP_LOGI("boot", "Loudness callback registered");
          ESP_LOGI("boot", "Microphone module: %s", "${mic_module}");
      - delay: 10s
      - light.turn_off: status_led
      - if:
          condition:
            and:
              - switch.is_off: mic_mute
              - switch.is_on: wakeword_detection_enable
          then:
            - logger.log:
                level: INFO
                format: "Starting micro_wake_word listening"
            - micro_wake_word.start:
          else:
            - logger.log:
                level: WARN
                format: "oWW NOT started: mic_mute or wakeword_detection_enable blocks"

esp32:
  board: esp32-s3-devkitc-1
  framework:
    type: esp-idf
    version: recommended
    sdkconfig_options:
      CONFIG_ESP32S3_DEFAULT_CPU_FREQ_240: y
      CONFIG_COMPILER_OPTIMIZATION_PERFORMANCE: y
  flash_size: 8MB

psram:
  mode: octal
  speed: 80MHz

logger:
  level: INFO

api:
  # No encryption: SmartMic ships as open-source fleet firmware. Adding the
  # key to a public release would make it shared/public anyway, so it offers
  # no real protection. Trust the LAN — segment via your router if needed.
  services:
    - service: start_follow_up
      then:
        - logger.log: "Follow-up STT requested via API"
        - if:
            condition:
              and:
                - switch.is_off: mic_mute
                - switch.is_on: wakeword_detection_enable
            then:
              - micro_wake_word.stop:
              - text_sensor.template.publish:
                  id: satellite_state
                  state: "Listening"
              - light.turn_on:
                  id: status_led
                  effect: none
              - voice_assistant.start:
    - service: end_persistent
      then:
        - logger.log: "End persistent conversation via API"
        - voice_assistant.stop:
        - delay: 200ms
        - light.turn_off: status_led
        - text_sensor.template.publish:
            id: satellite_state
            state: "Ready"
        - if:
            condition:
              and:
                - switch.is_off: mic_mute
                - switch.is_on: wakeword_detection_enable
            then:
              - micro_wake_word.start:

ota:
  - platform: esphome
    password: !secret ota_password
  - platform: http_request                 # required by update.http_request below

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  power_save_mode: NONE
  fast_connect: true
  ap:
    ssid: "SmartMic Fallback Hotspot"
    password: !secret ap_password

captive_portal:

# ── OTA from GitHub releases ──
# Devices poll the manifest below and surface an "update available" entity in HA.
# CI/CD: tag `vX.Y` on github.com/bigbabol1/SmartMic → GitHub Action compiles +
# publishes a release with firmware.ota.bin + updates manifest.json on main.
http_request:
  verify_ssl: true                       # GitHub uses well-known CAs (Mozilla bundle in ESP-IDF)
  timeout: 30s

update:
  - platform: http_request
    name: "Firmware update"
    id: firmware_update
    source: "https://raw.githubusercontent.com/bigbabol1/SmartMic/main/manifest.json"
    update_interval: 30min

# ── Persistent globals ──
globals:
  - id: g_wakeword_detection_state
    type: bool
    restore_value: true
    initial_value: '1'
  - id: g_noise_level
    type: int
    restore_value: true
    initial_value: '2'
  - id: g_auto_gain
    type: int
    restore_value: true
    initial_value: '24'
  - id: g_volume_mult
    type: float
    restore_value: true
    initial_value: '2.0'
  - id: g_prob_cutoff
    type: float
    restore_value: true
    initial_value: '0.5'
  - id: g_sliding_window
    type: int
    restore_value: true
    initial_value: '10'
  - id: g_loudness
    type: float
    restore_value: false
    initial_value: '-100.0'

# ── I2S bus (shared) ──
i2s_audio:
  id: i2s_bus
  i2s_lrclk_pin: GPIO8   # WS
  i2s_bclk_pin:  GPIO7   # BCLK

# ── Microphone (INMP441, L/R → GND → left channel, mono) ──
microphone:
  - platform: i2s_audio
    id: mic_array
    i2s_audio_id: i2s_bus
    adc_type: external
    i2s_din_pin: GPIO9
    pdm: false
    bits_per_sample: 32bit
    channel: left

# ── On-device wake word (gates voice_assistant) ──
micro_wake_word:
  id: mww
  microphone: mic_array
  vad:
  models:
    - model: hey_jarvis
      probability_cutoff: 0.5
      sliding_window_size: 10
  on_wake_word_detected:
    - logger.log:
        level: INFO
        format: "Wake word detected: %s"
        args: [wake_word]
    - light.turn_on:
        id: status_led
        effect: none
    - text_sensor.template.publish:
        id: satellite_state
        state: "Listening"
    - voice_assistant.start:
        wake_word: !lambda 'return wake_word;'

# ── Voice assistant (HA pipeline) ──
voice_assistant:
  id: satellite
  microphone: mic_array
  use_wake_word: false
  noise_suppression_level: 2
  auto_gain: 24dBFS
  volume_multiplier: 2.0

  on_stt_vad_end:
    - logger.log: "STT VAD end — processing"
    - light.turn_on:
        id: status_led
        effect: "blink_fast"
    - text_sensor.template.publish:
        id: satellite_state
        state: "Processing"

  on_tts_start:
    - logger.log: "TTS start"
    - light.turn_on:
        id: status_led
        effect: "blink_slow"
    - text_sensor.template.publish:
        id: satellite_state
        state: "Responding"

  on_tts_end:
    - logger.log: "TTS end"
    - text_sensor.template.publish:
        id: satellite_state
        state: "Ready"

  # ── Voice-timer hooks ──
  on_timer_started:
    - logger.log:
        level: INFO
        format: "Timer started: %s (%us)"
        args: [timer.name.c_str(), (unsigned int) timer.total_seconds]
    - text_sensor.template.publish:
        id: satellite_state
        state: "Timer running"

  on_timer_finished:
    - logger.log:
        level: INFO
        format: "Timer finished: %s"
        args: [timer.name.c_str()]
    - light.turn_on:
        id: status_led
        effect: "blink_fast"
    - text_sensor.template.publish:
        id: satellite_state
        state: "Timer finished"
    - homeassistant.service:
        service: mic_to_mediaplayer.announce
        data_template:
          satellite_entity_id: "{{ sat }}"
          message: '{% if timer_name %}Timer {{ timer_name }} is up.{% else %}Timer is up.{% endif %}'
        variables:
          sat: !lambda |-
            std::string n = App.get_name();
            for (auto& c : n) if (c == '-') c = '_';
            return std::string("assist_satellite.") + n + "_assist_satellit";
          timer_name: !lambda 'return timer.name;'
    - delay: 8s
    - light.turn_off: status_led
    - text_sensor.template.publish:
        id: satellite_state
        state: "Ready"

  on_timer_cancelled:
    - logger.log:
        level: INFO
        format: "Timer cancelled: %s"
        args: [timer.name.c_str()]
    - text_sensor.template.publish:
        id: satellite_state
        state: "Ready"

  on_timer_updated:
    - logger.log:
        level: INFO
        format: "Timer updated: %s (%us left)"
        args: [timer.name.c_str(), (unsigned int) timer.seconds_left]

  on_end:
    - logger.log: "Pipeline end"
    - delay: 500ms
    - if:
        condition:
          lambda: 'return !id(satellite).is_running();'
        then:
          - logger.log: "VA idle — restoring wake mode"
          - light.turn_off: status_led
          - text_sensor.template.publish:
              id: satellite_state
              state: "Ready"
          - if:
              condition:
                and:
                  - switch.is_off: mic_mute
                  - switch.is_on: wakeword_detection_enable
              then:
                - micro_wake_word.start:
        else:
          - logger.log: "VA still running — continue conversation, skip wake restart"

  on_error:
    - logger.log:
        format: "Pipeline error — code=%s msg=%s"
        args: [code.c_str(), message.c_str()]
    - if:
        condition:
          and:
            - switch.is_on: persistent_conversation
            - switch.is_off: mic_mute
            - switch.is_on: wakeword_detection_enable
            - lambda: 'return std::string(code) == "stt-no-text-recognized";'
        then:
          - logger.log: "Persistent mode: STT silent — quietly re-arming listen"
          - voice_assistant.stop:
          - delay: 200ms
          - text_sensor.template.publish:
              id: satellite_state
              state: "Listening"
          - light.turn_on:
              id: status_led
              effect: none
          - voice_assistant.start:
        else:
          - light.turn_on:
              id: status_led
              effect: "error_flash"
          - text_sensor.template.publish:
              id: satellite_state
              state: "Error"
          - delay: 5s
          - light.turn_off: status_led
          - voice_assistant.stop:
          - delay: 3s
          - if:
              condition:
                and:
                  - switch.is_off: mic_mute
                  - switch.is_on: wakeword_detection_enable
              then:
                - micro_wake_word.start:

# ── UI controls ──
switch:
  - platform: template
    name: "Microphone mute"
    id: mic_mute
    icon: mdi:microphone-off
    restore_mode: RESTORE_DEFAULT_OFF
    lambda: |-
      return id(mic_mute).state;
    turn_on_action:
      - micro_wake_word.stop:
      - voice_assistant.stop:
      - light.turn_off: status_led
      - text_sensor.template.publish:
          id: satellite_state
          state: "Muted"
    turn_off_action:
      - text_sensor.template.publish:
          id: satellite_state
          state: "Ready"
      - if:
          condition:
            switch.is_on: wakeword_detection_enable
          then:
            - micro_wake_word.start:

  - platform: template
    name: "Persistent Conversation"
    id: persistent_conversation
    icon: mdi:repeat
    restore_mode: RESTORE_DEFAULT_ON
    optimistic: true

  - platform: template
    name: "Wake Word Detection"
    id: wakeword_detection_enable
    icon: mdi:microphone
    restore_mode: RESTORE_DEFAULT_ON
    lambda: |-
      return id(g_wakeword_detection_state);
    turn_on_action:
      - globals.set:
          id: g_wakeword_detection_state
          value: 'true'
      - logger.log: "Wake word detection ENABLED"
      - if:
          condition:
            switch.is_off: mic_mute
          then:
            - micro_wake_word.start:
            - text_sensor.template.publish:
                id: satellite_state
                state: "Ready"
    turn_off_action:
      - globals.set:
          id: g_wakeword_detection_state
          value: 'false'
      - logger.log: "Wake word detection DISABLED"
      - micro_wake_word.stop:
      - voice_assistant.stop:
      - text_sensor.template.publish:
          id: satellite_state
          state: "Off"

number:
  - platform: template
    name: "Noise suppression"
    id: noise_suppression
    icon: mdi:waveform
    min_value: 0
    max_value: 4
    step: 1
    lambda: |-
      return id(g_noise_level);
    set_action:
      - lambda: |-
          id(g_noise_level) = (int)x;
          id(satellite).set_noise_suppression_level((int)x);
          id(noise_suppression).publish_state(x);
      - logger.log:
          format: "Noise suppression: %d"
          args: ['(int)x']

  - platform: template
    name: "Auto-Gain (dBFS)"
    id: auto_gain_ctrl
    icon: mdi:knob
    min_value: 0
    max_value: 31
    step: 1
    lambda: |-
      return id(g_auto_gain);
    set_action:
      - lambda: |-
          id(g_auto_gain) = (int)x;
          id(satellite).set_auto_gain((int)x);
          id(auto_gain_ctrl).publish_state(x);
      - logger.log:
          format: "Auto-Gain: %d dBFS"
          args: ['(int)x']

  - platform: template
    name: "Microphone gain"
    id: volume_amplifier
    icon: mdi:volume-high
    min_value: 0.5
    max_value: 12.0
    step: 0.5
    lambda: |-
      return id(g_volume_mult);
    set_action:
      - lambda: |-
          id(g_volume_mult) = x;
          id(satellite).set_volume_multiplier(x);
          id(volume_amplifier).publish_state(x);
      - logger.log:
          format: "Gain: %.1f"
          args: ['x']

  - platform: template
    name: "Wake Probability Cutoff"
    id: prob_cutoff_ctrl
    icon: mdi:tune
    min_value: 0.3
    max_value: 0.95
    step: 0.05
    lambda: |-
      return id(g_prob_cutoff);
    set_action:
      - lambda: |-
          id(g_prob_cutoff) = x;
          for (auto* m : id(mww).get_wake_words()) {
            m->set_probability_cutoff((uint8_t)(x * 255.0f));
          }
          id(prob_cutoff_ctrl).publish_state(x);
      - logger.log:
          format: "Probability Cutoff: %.2f"
          args: ['x']

  - platform: template
    name: "Wake Sliding Window"
    id: sliding_window_ctrl
    icon: mdi:tune-variant
    min_value: 1
    max_value: 20
    step: 1
    lambda: |-
      return id(g_sliding_window);
    set_action:
      - lambda: |-
          id(g_sliding_window) = (int)x;
          id(sliding_window_ctrl).publish_state(x);
      - logger.log:
          format: "Sliding Window: %d (YAML edit + recompile required)"
          args: ['(int)x']

button:
  - platform: restart
    name: "Restart"
    icon: mdi:restart
    entity_category: config

  - platform: template
    name: "Check for updates"
    icon: mdi:cloud-download
    entity_category: config
    on_press:
      - logger.log: "Manual update check requested"
      - component.update: firmware_update    # re-fetch manifest, surface latest in HA

text_sensor:
  - platform: template
    name: "Satellite Status"
    id: satellite_state
    icon: mdi:assistant
    lambda: |-
      return {"Ready"};

binary_sensor:
  - platform: status
    name: "Connection status"
    entity_category: diagnostic

sensor:
  - platform: template
    name: "Microphone loudness (dBFS)"
    id: mic_loudness
    icon: mdi:volume-vibrate
    unit_of_measurement: "dBFS"
    accuracy_decimals: 1
    update_interval: 1s
    lambda: |-
      return id(g_loudness);

# ── External LED (GPIO4) + onboard test LED (GPIO21) ──
output:
  - platform: gpio
    id: led_out
    pin:
      number: GPIO4
      inverted: true
  - platform: gpio
    id: led_onboard_out
    pin:
      number: GPIO21         # XIAO ESP32-S3 onboard yellow user LED (LED_BUILTIN)
      inverted: true

light:
  - platform: binary
    id: status_led
    name: "Status LED"
    output: led_out
  - platform: binary
    id: onboard_led
    name: "Onboard LED test"
    entity_category: diagnostic
    output: led_onboard_out
    effects:
      - strobe:
          name: "pulse_slow"
          colors:
            - state: true
              duration: 800ms
            - state: false
              duration: 800ms
      - strobe:
          name: "blink_fast"
          colors:
            - state: true
              duration: 120ms
            - state: false
              duration: 120ms
      - strobe:
          name: "blink_slow"
          colors:
            - state: true
              duration: 500ms
            - state: false
              duration: 500ms
      - strobe:
          name: "error_flash"
          colors:
            - state: true
              duration: 100ms
            - state: false
              duration: 100ms

